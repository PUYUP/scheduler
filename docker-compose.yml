########################################################################
#  Paper RAG Pipeline — Docker Compose
#  Services: Redis, Grobid, TEI, Worker (3 tiers), Beat Scheduler, Flower
########################################################################

x-celery-common: &celery-common
  image: atlanize/paper-miner:${IMAGE_TAG:-latest}
  env_file: .env
  environment:
    # Volume sudah pasti terisi sebelum container ini start (lihat depends_on
    # model-init di bawah), jadi aman cegah network call ke HF Hub sama sekali.
    HF_HUB_OFFLINE: "1"
    TRANSFORMERS_OFFLINE: "1"
    HF_HOME: "/home/atlazer/.cache/huggingface"
  volumes:
    - downloads:/app/downloads
    - gemini_batch:/app/gemini_batch
    - logs:/app/logs
    - hf_home:/home/atlazer/.cache/huggingface
    - onnx_cache:/app/data/onnx_cache
    - stanza_cache:/home/atlazer/.cache/resources
  depends_on:
    redis:
      condition: service_healthy
    grobid:
      condition: service_healthy
    model-init:
      condition: service_completed_successfully
    stanza-init:
      condition: service_completed_successfully
    onnx-export:
      condition: service_completed_successfully
  restart: unless-stopped
  networks:
    - atlazer-net


services:

  # ─── Dummy Build Service ─────────────────────────────────────
  # Satu-satunya tempat `build:` didefinisikan. Semua service lain yang
  # butuh image `atlanize/paper-miner` (celery services, model-init,
  # onnx-export) cukup referensi `image:` yang sama tanpa build ulang.
  # Service ini tidak pernah benar-benar dijalankan — profiles memastikan
  # dia di-exclude dari `docker compose up` biasa.
  #
  # Build image:
  #   docker compose build builder
  # Build dengan tag versi eksplisit:
  #   IMAGE_TAG=$(git rev-parse --short HEAD) docker compose build builder
  builder:
    build:
      context: .
      dockerfile: Dockerfile
      target: final
    image: atlanize/paper-miner:${IMAGE_TAG:-latest}
    profiles: ["build-only"]
    command: ["true"]
    restart: "no"


  # ─── 1. Model Cache Warmer ──────────────────────────────────────
  # Jalan sekali sebelum semua worker start, download model embedding
  # ke shared volume `hf_home`. Container ini perlu akses internet;
  # worker/beat/flower TIDAK (HF_HUB_OFFLINE=1 di x-celery-common).
  model-init:
    image: atlanize/paper-miner:${IMAGE_TAG:-latest}
    env_file: .env
    environment:
      # Override eksplisit — container ini WAJIB online untuk download.
      # Mencegah kebocoran HF_HUB_OFFLINE=1 dari .env atau image lama yang
      # belum di-rebuild dari Dockerfile versi terbaru.
      - HF_HUB_OFFLINE=0
      - TRANSFORMERS_OFFLINE=0
    volumes:
      - hf_home:/home/atlazer/.cache/huggingface
    command: ["python", "src/atlazer/scripts/warm_model_cache.py"]
    networks:
      - atlazer-net
    restart: "no"

  
  # ─── 2. Stanza Cache Warmer ─────────────────────────────────────
  # Jalan sekali sebelum semua worker start, download model stanza
  # ke shared volume `hf_home`. Container ini perlu akses internet;
  # worker/beat/flower TIDAK (HF_HUB_OFFLINE=1 di x-celery-common).
  stanza-init:
    image: atlanize/paper-miner:${IMAGE_TAG:-latest}
    env_file: .env
    environment:
      - HF_HUB_OFFLINE=0
      - TRANSFORMERS_OFFLINE=0
      - STANZA_LANGS=en,id
    volumes:
      - hf_home:/home/atlazer/.cache/huggingface
      - stanza_cache:/home/atlazer/.cache/resources
    depends_on:
      model-init:
        condition: service_completed_successfully
    command: ["python", "src/atlazer/scripts/stanza_warmup.py"]
    networks:
      - atlazer-net
    restart: "no"


  # ─── 3. ONNX Export Container ─────────────────────────────────
  onnx-export:
    image: atlanize/paper-miner:${IMAGE_TAG:-latest}
    env_file: .env
    environment:
      - ONNX_CACHE_DIR=/app/data/onnx_cache
      - HF_HUB_OFFLINE=0
      - TRANSFORMERS_OFFLINE=0
      - HF_TOKEN=${HF_TOKEN}
    volumes:
      - hf_home:/home/atlazer/.cache/huggingface
      - onnx_cache:/app/data/onnx_cache
    depends_on:
      stanza-init:
        condition: service_completed_successfully
    command: ["python", "src/atlazer/scripts/export_onnx.py"]
    networks:
      - atlazer-net
    restart: "no"


  # ─── Message Broker ─────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    command: >
      redis-server
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - atlazer-net
    restart: unless-stopped


  # ─── Grobid: PDF Structural Parsing ─────────────────────────
  grobid:
    image: lfoppiano/grobid:0.9.0-crf
    ports:
      - "8070:8070"
    environment:
      - JAVA_OPTS=-Xms1g -Xmx4g
    volumes:
      - grobid_tmp:/tmp/grobid
      - ./grobid.yaml:/opt/grobid/grobid-home/config/grobid.yaml:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8070/api/isalive | grep -q true"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s
    networks:
      - atlazer-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4g
        reservations:
          memory: 2g


  # ─── TEI --
  tei:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.9
    pull_policy: always
    ports:
      - "9090:80"
    environment:
      - HF_TOKEN=${HF_TOKEN}
    volumes:
      - ./data:/data
    command: [
      "--model-id", "${LOCAL_EMBEDDING_MODEL}",
      "--max-batch-tokens", "2048",
      "--max-client-batch-size", "8",
      "--auto-truncate"
    ]
    healthcheck:
      test: ["CMD-SHELL", "curl", "-sf", "http://localhost:80/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 4g
        reservations:
          memory: 2g
    networks:
      - atlazer-net
    restart: unless-stopped


  # ─── WebAPI: FastAPI Service ────────────────────────────────
  webapi:
    <<: *celery-common
    command: >
      uvicorn atlazer.webapi.main:app
      --host 0.0.0.0
      --port 8000
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 300s
      timeout: 10s
      retries: 5
      start_period: 300s
    deploy:
      replicas: 1


  # ─── Beat Scheduler (cron-style task dispatch) ───────────────
  celery-beat:
    <<: *celery-common
    command: >
      celery -A atlazer.celery_app.main beat
      --loglevel=info
      --scheduler celery.beat.PersistentScheduler
      --schedule /app/logs/celerybeat-schedule
    deploy:
      replicas: 1


  # ─── Worker Tier 1: Scrape Queue ────────────────────────────
  worker-scrape:
    <<: *celery-common
    command: >
      celery -A atlazer.celery_app.main worker
      --loglevel=info
      --queues=scrape
      --concurrency=1
      --prefetch-multiplier=1
      --max-tasks-per-child=100
      --hostname=scrape@%h
    deploy:
      replicas: 1
    healthcheck:
      test: [
        "CMD-SHELL", 
        "celery -A atlazer.celery_app.main inspect ping -d scrape@$$HOSTNAME --timeout=10 | grep -q OK"
      ]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 60s


  # ─── Worker Tier 2: Process Queue ───────────────────────────
  worker-process:
    <<: *celery-common
    command: >
      celery -A atlazer.celery_app.main worker
      --loglevel=info
      --queues=process
      --concurrency=1
      --prefetch-multiplier=1
      --max-tasks-per-child=50
      --hostname=process@%h
    deploy:
      replicas: 1
    healthcheck:
      test: [
        "CMD-SHELL", 
        "celery -A atlazer.celery_app.main inspect ping -d process@$$HOSTNAME --timeout=10 | grep -q OK"
      ]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 60s


  # ─── Worker Tier 3: Embed Queue ─────────────────────────────
  worker-embed:
    <<: *celery-common
    environment:
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
    command: >
      celery -A atlazer.celery_app.main worker
      --loglevel=info
      --queues=embed
      --concurrency=1
      --prefetch-multiplier=1
      --max-tasks-per-child=200
      --hostname=embed@%h
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 4g
        reservations:
          memory: 2g
    healthcheck:
      test: [
        "CMD-SHELL", 
        "celery -A atlazer.celery_app.main inspect ping -d embed@$$HOSTNAME --timeout=10 | grep -q OK"
      ]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 60s
  

  # ─── Worker Tier 4: Store Queue ─────────────────────────────
  worker-store:
    <<: *celery-common
    command: >
      celery -A atlazer.celery_app.main worker
      --loglevel=info
      --queues=store
      --concurrency=1
      --prefetch-multiplier=1
      --max-tasks-per-child=200
      --hostname=store@%h
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 512m
    healthcheck:
      test: [
        "CMD-SHELL", 
        "celery -A atlazer.celery_app.main inspect ping -d store@$$HOSTNAME --timeout=10 | grep -q OK"
      ]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 60s


  # ─── Worker: WebAPI Queue ───────────────────────────────────
  worker-webapi:
    <<: *celery-common
    command: >
      celery -A atlazer.celery_app.main worker
      --loglevel=info
      --queues=webapi
      --concurrency=1
      --prefetch-multiplier=1
      --max-tasks-per-child=100
      --hostname=webapi@%h
    deploy:
      replicas: 1
    healthcheck:
      test: [
        "CMD-SHELL", 
        "celery -A atlazer.celery_app.main inspect ping -d webapi@$$HOSTNAME --timeout=10 | grep -q OK"
      ]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 60s


  # ─── Worker: Matcher Queue ───────────────────────────────────
  worker-matcher:
    <<: *celery-common
    command: >
      celery -A atlazer.celery_app.main worker
      --loglevel=info
      --queues=matcher
      --concurrency=1
      --prefetch-multiplier=1
      --max-tasks-per-child=100
      --hostname=matcher@%h
    deploy:
      replicas: 1
    healthcheck:
      test: [
        "CMD-SHELL", 
        "celery -A atlazer.celery_app.main inspect ping -d matcher@$$HOSTNAME --timeout=10 | grep -q OK"
      ]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 60s


  # ─── Worker: Challenge Queue ───────────────────────────────────
  worker-challenge:
    <<: *celery-common
    command: >
      celery -A atlazer.celery_app.main worker
      --loglevel=info
      --queues=challenge
      --concurrency=1
      --prefetch-multiplier=1
      --max-tasks-per-child=100
      --hostname=challenge@%h
    deploy:
      replicas: 1
    healthcheck:
      test: [
        "CMD-SHELL", 
        "celery -A atlazer.celery_app.main inspect ping -d challenge@$$HOSTNAME --timeout=10 | grep -q OK"
      ]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 60s


  # ─── Worker: Evaluation Queue ───────────────────────────────────
  worker-evaluation:
    <<: *celery-common
    command: >
      celery -A atlazer.celery_app.main worker
      --loglevel=info
      --queues=evaluation
      --concurrency=1
      --prefetch-multiplier=1
      --max-tasks-per-child=100
      --hostname=evaluation@%h
    deploy:
      replicas: 1
    healthcheck:
      test: [
        "CMD-SHELL", 
        "celery -A atlazer.celery_app.main inspect ping -d evaluation@$$HOSTNAME --timeout=10 | grep -q OK"
      ]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 60s


  # ─── Worker: Maintenance Queue (DLQ retry, cleanup, health check) ───
  worker-default:
    <<: *celery-common
    command: >
      celery -A atlazer.celery_app.main worker
      --loglevel=info
      --queues=default
      --concurrency=1
      --prefetch-multiplier=1
      --max-tasks-per-child=200
      --hostname=default@%h
    deploy:
      replicas: 1
    healthcheck:
      test: [
        "CMD-SHELL", 
        "celery -A atlazer.celery_app.main inspect ping -d default@$$HOSTNAME --timeout=10 | grep -q OK"
      ]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 60s

  
  # ─── Flower: Real-time Task Monitor ─────────────────────────
  flower:
    <<: *celery-common
    command: >
      celery -A atlazer.celery_app.main flower
      --port=5555
      --url-prefix=flower
      --max-tasks=10000
    ports:
      - "5555:5555"
    depends_on:
      - redis
      - worker-scrape
      - worker-process
      - worker-embed
      - worker-store
      - worker-webapi
      - worker-matcher
      - worker-challenge
      - worker-default


volumes:
  redis_data:
  downloads:
  gemini_batch:
  logs:
  grobid_tmp:
  hf_home:
  onnx_cache:
  stanza_cache:


networks:
  atlazer-net:
    driver: bridge