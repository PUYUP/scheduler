########################################################################
#  Paper RAG Pipeline — Docker Compose
#  Services: Redis, Grobid, Worker (3 tiers), Beat Scheduler, Flower
########################################################################

x-celery-common: &celery-common
  build:
    context: .
    dockerfile: Dockerfile
    target: final
  image: atlaner/paper-rag:latest
  env_file: .env
  environment:
    # Volume sudah pasti terisi sebelum container ini start (lihat depends_on
    # model-init di bawah), jadi aman cegah network call ke HF Hub sama sekali.
    HF_HUB_OFFLINE: "1"
    TRANSFORMERS_OFFLINE: "1"
  volumes:
    - downloads:/app/downloads
    - logs:/app/logs
    - hf-cache:/home/atlazer/.cache/huggingface
  depends_on:
    redis:
      condition: service_healthy
    grobid:
      condition: service_healthy
    model-init:
      condition: service_completed_successfully
  restart: unless-stopped
  networks:
    - atlaner-net


services:

  # ─── Model Cache Warmer ──────────────────────────────────────
  # Jalan sekali sebelum semua worker start, download model embedding
  # ke shared volume `hf-cache`. Container ini perlu akses internet;
  # worker/beat/flower TIDAK (HF_HUB_OFFLINE=1 di x-celery-common).
  model-init:
    build:
      context: .
      dockerfile: Dockerfile
      target: final
    image: atlaner/paper-rag:latest
    env_file: .env
    environment:
      # Override eksplisit — container ini WAJIB online untuk download.
      # Mencegah kebocoran HF_HUB_OFFLINE=1 dari .env atau image lama yang
      # belum di-rebuild dari Dockerfile versi terbaru.
      HF_HUB_OFFLINE: "0"
      TRANSFORMERS_OFFLINE: "0"
    volumes:
      - hf-cache:/home/atlazer/.cache/huggingface
    command: ["python", "src/atlaner/scripts/warm_model_cache.py"]
    networks:
      - atlaner-net
    restart: "no"

  # ─── Message Broker ─────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    command: >
      redis-server
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - atlaner-net
    restart: unless-stopped


  # ─── Grobid: PDF Structural Parsing ─────────────────────────
  grobid:
    image: lfoppiano/grobid:0.9.0
    ports:
      - "8070:8070"
    environment:
      - JAVA_OPTS=-Xms1g -Xmx4g
    volumes:
      - grobid-tmp:/tmp/grobid
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8070/api/isalive | grep -q true"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s
    networks:
      - atlaner-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 6g
          cpus: "2.0"
        reservations:
          memory: 4g


  # ─── WebAPI: FastAPI Service ────────────────────────────────
  webapi:
    <<: *celery-common
    command: >
      uvicorn atlaner.webapi.main:app
      --host 0.0.0.0
      --port 8000
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    deploy:
      replicas: 1

  # ─── Beat Scheduler (cron-style task dispatch) ───────────────
  celery-beat:
    <<: *celery-common
    command: >
      celery -A atlaner.celery_app.main beat
      --loglevel=info
      --scheduler celery.beat.PersistentScheduler
      --schedule /app/logs/celerybeat-schedule
    deploy:
      replicas: 1


  # ─── Worker Tier 1: Scrape Queue ────────────────────────────
  worker-scrape:
    <<: *celery-common
    command: >
      celery -A atlaner.celery_app.main worker
      --loglevel=info
      --queues=scrape
      --concurrency=1
      --prefetch-multiplier=1
      --max-tasks-per-child=100
      --hostname=scrape@%h
    deploy:
      replicas: 1


  # ─── Worker Tier 2: Process Queue ───────────────────────────
  worker-process:
    <<: *celery-common
    command: >
      celery -A atlaner.celery_app.main worker
      --loglevel=info
      --queues=process
      --concurrency=1
      --prefetch-multiplier=1
      --max-tasks-per-child=50
      --hostname=process@%h
    deploy:
      replicas: 1


  # ─── Worker Tier 3: Embed Queue ─────────────────────────────
  worker-embed:
    <<: *celery-common
    command: >
      celery -A atlaner.celery_app.main worker
      --loglevel=info
      --queues=embed
      --concurrency=1
      --prefetch-multiplier=1
      --max-tasks-per-child=200
      --hostname=embed@%h
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 6g
        reservations:
          memory: 4g


  # ─── Worker: Maintenance Queue (DLQ retry, cleanup, health check) ───
  worker-default:
    <<: *celery-common
    command: >
      celery -A atlaner.celery_app.main worker
      --loglevel=info
      --queues=default
      --concurrency=1
      --prefetch-multiplier=1
      --max-tasks-per-child=200
      --hostname=default@%h
    deploy:
      replicas: 1

  
  # ─── Flower: Real-time Task Monitor ─────────────────────────
  flower:
    <<: *celery-common
    command: >
      celery -A atlaner.celery_app.main flower
      --port=5555
      --url-prefix=flower
      --max-tasks=10000
    ports:
      - "5555:5555"
    depends_on:
      - redis
      - worker-scrape
      - worker-process
      - worker-embed
      - worker-default


volumes:
  redis-data:
  downloads:
  logs:
  grobid-tmp:
  hf-cache:


networks:
  atlaner-net:
    driver: bridge
